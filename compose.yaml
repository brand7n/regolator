version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.php-fpm
    image: regolator-php
    container_name: regolator-php
    working_dir: /home/brandin/regolator
    volumes:
      - /home/brandin/regolator:/home/brandin/regolator
    # Expose php-fpm to host Caddy only
    ports:
      - "127.0.0.1:9001:9000"
    restart: unless-stopped

  scheduler:
    image: regolator-php
    container_name: regolator-scheduler
    working_dir: /home/brandin/regolator
    volumes:
      - /home/brandin/regolator:/home/brandin/regolator
    command: php artisan schedule:work
    depends_on:
      - php
    restart: unless-stopped

  nightwatch:
    image: regolator-php
    container_name: regolator-nightwatch
    working_dir: /home/brandin/regolator
    volumes:
      - /home/brandin/regolator:/home/brandin/regolator
    command: php artisan nightwatch:agent
    depends_on:
      - php
    restart: unless-stopped
